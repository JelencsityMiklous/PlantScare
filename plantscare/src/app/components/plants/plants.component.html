
<div class="container">

    <button class="btn btn-success mb-3" routerLink="/plants/add">Add Plant</button>

    <table class="table">
  <thead>
    <tr>
      <th scope="col">ID</th>
      <th scope="col">Name</th>
      <th scope="col">Species</th>
      <th scope="col">Water interval</th>
      <th scope="col">Operations</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let plant of plants">
      <th scope="row">{{ plant.id }}</th>
      <td>{{ plant.name }}</td>
      <td>{{ plant.species }}</td>
      <td>{{ plant.water_interval_days }}</td>
      <td>
        <button class="btn btn-primary btn-sm">Edit</button>
        <button class="btn btn-danger btn-sm" (click)="deletePlant(plant.id)">Delete</button>
      </td>
    </tr>
  </tbody>
</table>
</div>
